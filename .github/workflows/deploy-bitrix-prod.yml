name: Deploy bitrix (prod)

# Схема как в back/deploy-monorepo.yml:
#  - build: образ собирается в CI и пушится в GHCR (+ registry-кэш слоёв,
#    поэтому при неизменном lockfile пересборка быстрая);
#  - deploy: сервер делает pull готового образа и up -d — минуты вместо
#    сборки на сервере, и без sleep-простыней (ждём healthcheck поллингом).
#
# Что нужно настроить один раз в репо:
#  - Variables: BITRIX_NEXT_PUBLIC_APP_URL (обязательно),
#    BITRIX_NEXT_PUBLIC_WS_HOST, BITRIX_YANDEX_ID — build-time значения,
#    должны совпадать с apps/bitrix/.env на сервере;
#  - Secret GHCR_PAT (classic PAT с read:packages) — чтобы сервер мог
#    пуллить приватный образ из GHCR (можно тот же, что в back-репо).

on:
  push:
    branches:
      - main
    paths:
      - "apps/bitrix/**"
      # bitrix зависит от воркспейс-пакетов и общих конфигов
      - "packages/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "Dockerfile.prod"
      - "docker-compose.prod.yml"
      - ".github/workflows/deploy-bitrix-prod.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write # push образов в ghcr.io встроенным токеном

concurrency:
  group: deploy-bitrix-prod
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      owner: ${{ steps.owner.outputs.owner }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Логин в GHCR (встроенный токен, без PAT)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Owner в нижнем регистре (требование GHCR)
        id: owner
        run: echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Build & push front-bitrix
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.prod
          build-args: |
            APP=bitrix
            NEXT_PUBLIC_APP_URL=${{ vars.BITRIX_NEXT_PUBLIC_APP_URL }}
            NEXT_PUBLIC_WS_HOST=${{ vars.BITRIX_NEXT_PUBLIC_WS_HOST }}
            NEXT_PUBLIC_IN_BITRIX=true
            YANDEX_ID=${{ vars.BITRIX_YANDEX_ID }}
          push: true
          tags: |
            ghcr.io/${{ steps.owner.outputs.owner }}/april-front-bitrix:${{ github.sha }}
            ghcr.io/${{ steps.owner.outputs.owner }}/april-front-bitrix:latest
          cache-from: type=registry,ref=ghcr.io/${{ steps.owner.outputs.owner }}/april-front-bitrix:buildcache
          cache-to: type=registry,ref=ghcr.io/${{ steps.owner.outputs.owner }}/april-front-bitrix:buildcache,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy по SSH (pull + up, ждём healthcheck)
        uses: appleboy/ssh-action@v1.0.3
        env:
          IMAGE_TAG: ${{ github.sha }}
          GHCR_OWNER: ${{ github.repository_owner }}
          GHCR_USER: ${{ github.actor }}
          GHCR_PAT: ${{ secrets.GHCR_PAT }}
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          timeout: 60s
          command_timeout: 15m
          envs: IMAGE_TAG,GHCR_OWNER,GHCR_USER,GHCR_PAT
          script: |
            set -e
            cd /var/www/html/next/monorepo

            # GHCR требует owner в нижнем регистре; compose читает его из env
            GHCR_OWNER=$(echo "$GHCR_OWNER" | tr '[:upper:]' '[:lower:]')
            export GHCR_OWNER IMAGE_TAG
            COMPOSE="docker compose --env-file .env -f docker-compose.prod.yml"

            echo "🧩 Обновляю checkout (нужен свежий docker-compose.prod.yml и apps/bitrix/.env)"
            # Deploy-клон выравниваем жёстко под ветку (без merge/divergence).
            # .env-файлы в .gitignore — reset их не трогает.
            git fetch origin main
            git reset --hard origin/main

            if [ -n "$GHCR_PAT" ]; then
              echo "🔐 Логин в GHCR"
              echo "$GHCR_PAT" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
            else
              echo "ℹ️ GHCR_PAT пуст — пропускаю docker login (образ должен быть публичным)"
            fi

            echo "📦 pull front-bitrix:$IMAGE_TAG"
            $COMPOSE pull front-bitrix
            $COMPOSE up -d front-bitrix

            echo "⏳ Жду healthcheck контейнера"
            cid=$($COMPOSE ps -q front-bitrix)
            timeout=300; elapsed=0
            while true; do
              status=$(docker inspect -f '{{.State.Status}}' "$cid" 2>/dev/null || echo missing)
              health=$(docker inspect -f '{{if .State.Health}}{{.State.Health.Status}}{{else}}none{{end}}' "$cid" 2>/dev/null || echo unknown)
              if [ "$status" = "running" ] && { [ "$health" = "healthy" ] || [ "$health" = "none" ]; }; then
                echo "✅ front-bitrix: $status/$health"
                break
              fi
              if [ "$elapsed" -ge "$timeout" ]; then
                echo "❌ Таймаут ожидания (status=$status health=$health)"
                docker logs "$cid" --tail 200 || true
                exit 1
              fi
              echo "⌛ status=$status health=$health (${elapsed}s)"
              sleep 5; elapsed=$((elapsed + 5))
            done

            docker logs "$cid" --tail 50 || true
            docker image prune -f || true
            $COMPOSE ps
